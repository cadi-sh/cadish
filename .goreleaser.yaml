# goreleaser config for cadish. https://goreleaser.com
# Validate:  goreleaser check
# Dry run:   goreleaser release --snapshot --clean   (or: make snapshot)
# Release:   push a vX.Y.Z tag → the release workflow runs `goreleaser release`.
version: 2

project_name: cadish

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: cadish
    main: ./cmd/cadish
    binary: cadish
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Reproducible builds: trim paths and pin the build timestamp to the commit.
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/cadi-sh/cadish/internal/version.Version={{ .Version }}
      - -X github.com/cadi-sh/cadish/internal/version.Commit={{ .FullCommit }}
      - -X github.com/cadi-sh/cadish/internal/version.Date={{ .CommitDate }}

archives:
  - id: cadish
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - NOTICE
      - README.md
      - CHANGELOG.md
      - docs
      - examples

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Per-artifact SBOMs (syft) — one CycloneDX SBOM alongside each archive. Requires
# `syft` on the release runner (the release workflow installs it).
sboms:
  - id: archive
    artifacts: archive

# Keyless (OIDC) cosign signing of the checksums file. Requires `cosign` on the
# runner and `id-token: write` in the workflow (both set in release.yml). The
# COSIGN_EXPERIMENTAL flag enables keyless/Fulcio signing; the signature +
# certificate are uploaded next to checksums.txt.
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    output: true
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    env:
      - COSIGN_EXPERIMENTAL=1

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: cadi-sh
    name: cadish
  draft: false
  prerelease: auto
  name_template: "cadish {{ .Tag }}"

# The container image is NOT built here. goreleaser's `dockers` copies a prebuilt
# binary, which can't reuse the project's from-source multi-stage deploy/Dockerfile.
# Instead the release workflow builds a multi-arch image straight from
# deploy/Dockerfile with `docker buildx` (see .github/workflows/release.yml).
