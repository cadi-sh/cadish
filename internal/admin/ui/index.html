<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cadish · command center</title>
<style>
  :root {
    --bg: #0f1116; --panel: #181b22; --panel2: #1f232c; --line: #2a2f3a;
    --fg: #e6e8ee; --muted: #98a0b3; --accent: #4ea1ff; --good: #43c59e;
    --warn: #f4bf4f; --bad: #ff6b6b; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--line); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .5px; }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
  header .dot.live { background: var(--good); box-shadow: 0 0 8px var(--good); }
  header .spacer { flex: 1; }
  header small { color: var(--muted); font-family: var(--mono); }
  main { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .tile { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .tile .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; }
  .tile .v { font-size: 26px; font-weight: 600; margin-top: 4px; font-family: var(--mono); }
  .tile .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
    margin: 28px 0 12px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line); font-size: 13px; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  td.mono, .mono { font-family: var(--mono); }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.good { background: rgba(67,197,158,.15); color: var(--good); }
  .pill.warn { background: rgba(244,191,79,.15); color: var(--warn); }
  .pill.bad { background: rgba(255,107,107,.15); color: var(--bad); }
  .bar { height: 6px; background: var(--panel2); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .bar > i { display: block; height: 100%; background: var(--accent); }
  .phase { display: inline-block; min-width: 60px; }
  .login { max-width: 380px; margin: 80px auto; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 28px; }
  .login input { width: 100%; padding: 10px 12px; margin: 10px 0; background: var(--panel2);
    border: 1px solid var(--line); border-radius: 8px; color: var(--fg); font-family: var(--mono); }
  .login button { width: 100%; padding: 10px; background: var(--accent); color: #06121f; border: 0;
    border-radius: 8px; font-weight: 600; cursor: pointer; }
  .err { color: var(--bad); font-size: 13px; min-height: 18px; }
  .hidden { display: none; }
  code { font-family: var(--mono); color: var(--accent); }
  .muted { color: var(--muted); }
  /* Playground editor */
  .pg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  @media (max-width: 820px) { .pg { grid-template-columns: 1fr; } }
  .pg .col { display: flex; flex-direction: column; min-width: 0; }
  .pg label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .pg textarea, .pg pre {
    width: 100%; min-height: 320px; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 8px; color: var(--fg); font-family: var(--mono); font-size: 13px; line-height: 1.5;
    padding: 12px; tab-size: 4; }
  .pg textarea { resize: vertical; }
  .pg pre { margin: 0; overflow: auto; white-space: pre; }
  .pg .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .pg button.primary { padding: 8px 16px; background: var(--accent); color: #06121f; border: 0;
    border-radius: 8px; font-weight: 600; cursor: pointer; }
  .pg button.ghost { padding: 8px 14px; background: none; border: 1px solid var(--line);
    color: var(--muted); border-radius: 8px; cursor: pointer; }
  .pg .status { font-family: var(--mono); font-size: 13px; margin-left: auto; }
  .pg .status.ok { color: var(--good); }
  .pg .status.bad { color: var(--bad); }
  .diag { font-family: var(--mono); font-size: 12px; padding: 6px 10px; border-radius: 6px;
    margin: 4px 0; background: var(--panel2); border-left: 3px solid var(--muted); }
  .diag.error { border-left-color: var(--bad); }
  .diag.warning { border-left-color: var(--warn); }
  .diag .loc { color: var(--accent); cursor: pointer; }
  .pgreport { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; margin-top: 10px; }
</style>
</head>
<body>
<div id="login" class="login">
  <h1>cadish command center</h1>
  <p class="muted">Paste your admin token to connect.</p>
  <input id="token" type="password" placeholder="admin auth_token" autocomplete="off">
  <button id="connect">Connect</button>
  <div id="loginErr" class="err"></div>
</div>

<div id="app" class="hidden">
  <header>
    <span id="livedot" class="dot"></span>
    <h1>cadish</h1>
    <small id="uptime">—</small>
    <span class="spacer"></span>
    <small id="updated">—</small>
    <button id="logout" style="background:none;border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:4px 10px;cursor:pointer">disconnect</button>
  </header>
  <main>
    <div class="grid" id="tiles"></div>

    <h2>Latency</h2>
    <div class="grid" id="latency"></div>

    <h2>Security <span class="muted" id="secsub"></span></h2>
    <div class="grid" id="security"></div>

    <h2 id="ingressHead" class="hidden">Kubernetes Ingress <span class="muted" id="ingsub"></span></h2>
    <div class="grid hidden" id="ingress"></div>

    <h2>Sites &amp; cache</h2>
    <table id="sites"><thead><tr>
      <th>Site</th><th>RAM</th><th>Disk</th><th>Objects</th>
    </tr></thead><tbody></tbody></table>

    <h2>Upstreams</h2>
    <div id="upstreams"><p class="muted">No load-balanced upstreams.</p></div>

    <h2>Config &amp; rule model <span class="muted" id="cfgcost"></span></h2>
    <div id="config"></div>

    <h2>Playground &mdash; edit &amp; validate <span class="muted">(read-only preview, does not reload the server)</span></h2>
    <div class="pg">
      <div class="col">
        <div class="toolbar">
          <button class="primary" id="pgvalidate">Validate</button>
          <button class="ghost" id="pgreset" title="Reload the running config into the editor">Reset to running config</button>
          <span class="status" id="pgstatus">&mdash;</span>
        </div>
        <label for="pgsource">Cadishfile source <span class="muted" id="pgpath"></span></label>
        <textarea id="pgsource" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
        <div id="pgdiags"></div>
        <div class="pgreport hidden" id="pgreport"></div>
      </div>
      <div class="col">
        <label for="pgformatted">Formatted output <span class="muted">(cadish fmt)</span></label>
        <pre id="pgformatted"></pre>
      </div>
    </div>
  </main>
</div>

<script>
const $ = (s) => document.querySelector(s);
let TOKEN = sessionStorage.getItem("cadish_token") || "";
let streamAbort = null;

function authHeaders() { return { "Authorization": "Bearer " + TOKEN }; }
async function api(path) {
  const res = await fetch(path, { headers: authHeaders() });
  if (res.status === 401) throw new Error("unauthorized");
  return res.json();
}
function fmtBytes(b) {
  if (!b) return "0";
  const u = ["B","KiB","MiB","GiB","TiB"]; let i = 0; b = Number(b);
  while (b >= 1024 && i < u.length-1) { b /= 1024; i++; }
  return b.toFixed(b < 10 && i > 0 ? 1 : 0) + " " + u[i];
}
function pct(n) { return (n*100).toFixed(1) + "%"; }
function tile(k, v, sub) {
  return `<div class="tile"><div class="k">${k}</div><div class="v">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`;
}

function renderMetrics(m) {
  const s = m.snapshot;
  $("#tiles").innerHTML = [
    tile("Requests", s.requests.toLocaleString()),
    tile("Hit ratio", pct(m.hit_ratio), `${s.hits.toLocaleString()} hit · ${s.misses.toLocaleString()} miss`),
    tile("Stale hits", s.hits_stale.toLocaleString(), "served from grace"),
    tile("Pass", s.passes.toLocaleString(), "straight to origin"),
    tile("Coalesce", s.coalesce_waiters.toLocaleString(), `${s.coalesce_winners.toLocaleString()} winners`),
    tile("Origin", s.origin_fetches.toLocaleString(), `${s.origin_errors.toLocaleString()} errors`),
  ].join("");
  $("#latency").innerHTML = [
    tile("p50", m.latency_p50_ms.toFixed(1) + " ms"),
    tile("p99", m.latency_p99_ms.toFixed(1) + " ms"),
    tile("mean", m.latency_mean_ms.toFixed(2) + " ms", `${s.latency_count.toLocaleString()} samples`),
  ].join("");
  $("#uptime").textContent = "up " + Math.floor(s.uptime_seconds) + "s";
  renderSecurity(s);
}

// Security panel: the WAF v1 native-primitive counters (allow / deny / monitor
// would-block) and the rate_limit counters (throttle / would-429 / pass). Mirrors
// the metrics tiles' look; fed by the same SSE snapshot.
function renderSecurity(s) {
  const denyTotal = s.security_deny + s.rate_limit_throttle;
  $("#secsub").textContent = denyTotal
    ? `· ${denyTotal.toLocaleString()} blocked` : "· no blocks yet";
  $("#security").innerHTML = [
    tile("Allowed", s.security_allow.toLocaleString(), "allow-listed (short-circuit)"),
    tile("Denied", s.security_deny.toLocaleString(), "403 forbidden"),
    tile("Would-block", s.security_monitor.toLocaleString(), "monitor mode (passed)"),
    tile("Rate-limited", s.rate_limit_throttle.toLocaleString(), "429 too many requests"),
    tile("Would-429", s.rate_limit_monitor.toLocaleString(), "monitor mode (passed)"),
    tile("Rate-limit pass", s.rate_limit_pass.toLocaleString(), "rule applied, admitted"),
  ].join("");
}

// Kubernetes Ingress panel: the controller's reconcile snapshot (watched-Ingress
// count, last-applied config hash, per-reconcile rejects, leader status, last error).
// Present only in `cadish ingress` mode — the SSE frame omits "ingress" otherwise, so
// the panel stays hidden for a plain `cadish run`.
function renderIngress(ing) {
  if (!ing) return;
  $("#ingressHead").classList.remove("hidden");
  $("#ingress").classList.remove("hidden");
  $("#ingsub").textContent = ing.is_leader ? "· leader (writes status)" : "· follower";
  // last_error can carry attacker-influenced text (a malformed cadi.sh/policy fragment
  // or Ingress object surfaced in a render/apply error), so escape it before innerHTML.
  const errSub = ing.last_error ? escapeHtml(ing.last_error) : "healthy";
  $("#ingress").innerHTML = [
    tile("Watched Ingresses", ing.watched_ingresses.toLocaleString(), "objects owned"),
    tile("Last applied", `<span style="font-size:15px">${escapeHtml(ing.last_applied_hash || "—")}</span>`, "config hash"),
    tile("Rejects", ing.rejects.toLocaleString(), "last reconcile"),
    tile("Leader", ing.is_leader ? "yes" : "no", "writes Ingress status"),
    tile("Last error", `<span class="${ing.last_error?'pill bad':'pill good'}">${ing.last_error?'error':'none'}</span>`, errSub),
  ].join("");
}

function fillBar(used, max) {
  const r = max > 0 ? Math.min(1, used / max) : 0;
  return `${fmtBytes(used)}${max>0?` / ${fmtBytes(max)}`:""}<div class="bar"><i style="width:${(r*100).toFixed(1)}%"></i></div>`;
}
function renderSites(sites) {
  const tb = $("#sites tbody");
  tb.innerHTML = (sites||[]).map(s => `<tr>
    <td class="mono">${escapeHtml(s.name||"—")}</td>
    <td>${fillBar(s.cache.ram_bytes, s.cache.ram_max_bytes)}</td>
    <td>${fillBar(s.cache.disk_bytes, s.cache.disk_max_bytes)}</td>
    <td class="mono">${s.cache.ram_objects + s.cache.disk_objects}</td>
  </tr>`).join("") || `<tr><td colspan="4" class="muted">no sites</td></tr>`;
}
function renderUpstreams(ups) {
  if (!ups || !ups.length) { $("#upstreams").innerHTML = `<p class="muted">No load-balanced upstreams.</p>`; return; }
  $("#upstreams").innerHTML = ups.map(u => `
    <h3 style="font-size:13px;margin:14px 0 6px" class="mono">${escapeHtml(u.name)} <span class="muted">· ${escapeHtml(u.policy)}</span></h3>
    <table><thead><tr><th>Backend</th><th>Health</th><th>In-flight</th><th>Fails</th></tr></thead><tbody>
    ${(u.backends||[]).map(b => {
      let st = b.ejected ? `<span class="pill bad">ejected</span>` : b.healthy ? `<span class="pill good">up</span>` : `<span class="pill bad">down</span>`;
      return `<tr><td class="mono">${escapeHtml(b.base_url)}</td><td>${st}</td><td class="mono">${b.inflight}</td><td class="mono">${b.consec_fail}</td></tr>`;
    }).join("")}
    </tbody></table>`).join("");
}
function renderConfig(report) {
  if (report.error) { $("#config").innerHTML = `<p class="err">${escapeHtml(report.error)}</p>`; return; }
  let totalCost = 0;
  const html = (report.sites||[]).map(site => {
    totalCost += site.estimated_cost || 0;
    const phases = Object.entries(site.phase_counts||{}).map(([p,c]) => `<span class="phase mono">${escapeHtml(p)}:${c}</span>`).join(" ");
    const diags = (site.diagnostics||[]).map(d => `<div class="${d.severity==='error'?'err':'muted'}" style="font-size:12px">${escapeHtml(d.severity)}: ${escapeHtml(d.message)} <code>${escapeHtml(d.position||'')}</code></div>`).join("");
    return `<div class="tile" style="margin-bottom:10px">
      <div class="mono" style="font-weight:600">${escapeHtml((site.addresses||[]).join(", ")||"(top-level)")}</div>
      <div class="sub">${site.matcher_count} matchers · ${site.directive_count} directives · cost <b>${site.estimated_cost}</b> · ${site.regex_evals_per_request} regex/req</div>
      <div style="margin-top:6px">${phases}</div>
      ${(site.suggestions||[]).map(s=>`<div class="muted" style="font-size:12px">▸ ${escapeHtml(s)}</div>`).join("")}
      ${diags}
    </div>`;
  }).join("");
  $("#config").innerHTML = html || `<p class="muted">no sites</p>`;
  $("#cfgcost").textContent = totalCost ? `· total cost ${totalCost}` : "";
}

// ---- Playground: edit Cadishfile, POST /api/validate, render the verdict ----
const SAMPLE = `example.com {
    @img path /img/*
    cache_key url host
    cache_ttl 200 1h
    strip_cookies @img
}
`;
let pgTimer = null;

async function postValidate(src) {
  const res = await fetch("/api/validate", {
    method: "POST",
    headers: Object.assign({ "Content-Type": "text/plain" }, authHeaders()),
    body: src,
  });
  if (res.status === 401) throw new Error("unauthorized");
  return res.json();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
}

// Move the textarea caret to a 1-based line/col (so clicking a diagnostic jumps).
function gotoLineCol(line, col) {
  const ta = $("#pgsource");
  const lines = ta.value.split("\n");
  let pos = 0;
  for (let i = 0; i < line - 1 && i < lines.length; i++) pos += lines[i].length + 1;
  pos += Math.max(0, (col || 1) - 1);
  ta.focus();
  ta.setSelectionRange(pos, pos);
}

function renderPgDiag(d) {
  const sev = d.severity === "error" ? "error" : "warning";
  const loc = d.position ? `<span class="loc" data-line="${d.line||0}" data-col="${d.col||0}">${escapeHtml(d.position)}</span> ` : "";
  return `<div class="diag ${sev}">${loc}${escapeHtml(d.message)}</div>`;
}

function renderPgReport(rep) {
  const box = $("#pgreport");
  if (!rep || !(rep.sites || []).length) { box.classList.add("hidden"); box.innerHTML = ""; return; }
  let total = 0;
  const sites = (rep.sites || []).map(site => {
    total += site.estimated_cost || 0;
    const phases = Object.entries(site.phase_counts || {}).map(([p,c]) => `<span class="phase mono">${p}:${c}</span>`).join(" ");
    const cb = site.cost_breakdown || {};
    const sugg = (site.suggestions || []).map(s => `<div class="muted" style="font-size:12px">▸ ${escapeHtml(s)}</div>`).join("");
    const diags = (site.diagnostics || []).map(renderPgDiag).join("");
    return `<div style="margin-bottom:10px">
      <div class="mono" style="font-weight:600">${escapeHtml((site.addresses||[]).join(", ") || "(top-level)")}</div>
      <div class="sub">${site.matcher_count} matchers · ${site.directive_count} directives · cost <b>${site.estimated_cost}</b> · ${site.regex_evals_per_request} regex/req
        <span class="muted">(exact ${cb.exact||0} · glob ${cb.glob||0} · regex ${cb.regex||0})</span></div>
      <div style="margin-top:6px">${phases}</div>${sugg}${diags}
    </div>`;
  }).join("");
  const fileDiags = (rep.diagnostics || []).map(renderPgDiag).join("");
  box.innerHTML = `<div class="muted" style="font-size:12px;margin-bottom:8px">total cost ${total}</div>${fileDiags}${sites}`;
  box.classList.remove("hidden");
}

function renderValidate(v) {
  const status = $("#pgstatus");
  $("#pgformatted").textContent = v.formatted || "";
  const diags = [];
  if (v.parse_error) {
    diags.push(`<div class="diag error"><span class="loc" data-line="${v.parse_error.line||0}" data-col="${v.parse_error.col||0}">${escapeHtml(v.parse_error.position||"")}</span> ${escapeHtml(v.parse_error.message)}</div>`);
  }
  (v.compile_errors || []).forEach(ce => {
    diags.push(`<div class="diag error"><span class="loc" data-line="${ce.line||0}" data-col="${ce.col||0}">${escapeHtml(ce.position||"")}</span> ${escapeHtml(ce.message)}</div>`);
  });
  $("#pgdiags").innerHTML = diags.join("");
  renderPgReport(v.report);
  if (v.ok) {
    status.className = "status ok"; status.textContent = "✓ valid";
  } else {
    const n = (v.parse_error ? 1 : 0) + (v.compile_errors || []).length;
    status.className = "status bad"; status.textContent = `✗ ${n} error${n===1?"":"s"}`;
  }
}

async function runValidate() {
  $("#pgstatus").className = "status"; $("#pgstatus").textContent = "validating…";
  try {
    renderValidate(await postValidate($("#pgsource").value));
  } catch (e) {
    $("#pgstatus").className = "status bad"; $("#pgstatus").textContent = "error: " + e.message;
  }
}

function scheduleValidate() {
  clearTimeout(pgTimer);
  pgTimer = setTimeout(runValidate, 500); // debounce typing
}

async function loadRunningSource() {
  try {
    const sr = await api("/api/source");
    $("#pgpath").textContent = sr.path ? "· " + sr.path : "";
    $("#pgsource").value = (sr.source && sr.source.trim()) ? sr.source : SAMPLE;
  } catch (e) {
    $("#pgsource").value = SAMPLE;
  }
}

async function initPlayground() {
  await loadRunningSource();
  $("#pgvalidate").onclick = runValidate;
  $("#pgreset").onclick = async () => { await loadRunningSource(); runValidate(); };
  $("#pgsource").addEventListener("input", scheduleValidate);
  $("#pgdiags").addEventListener("click", onDiagClick);
  $("#pgreport").addEventListener("click", onDiagClick);
  runValidate(); // validate the pre-loaded config once
}

function onDiagClick(ev) {
  const t = ev.target.closest(".loc");
  if (!t) return;
  gotoLineCol(parseInt(t.dataset.line, 10) || 1, parseInt(t.dataset.col, 10) || 1);
}

function applyFrame(d) {
  if (d.metrics) renderMetrics(d.metrics);
  if (d.sites) renderSites(d.sites);
  if (d.upstreams) renderUpstreams(d.upstreams);
  if (d.ingress) renderIngress(d.ingress);
  $("#livedot").classList.add("live");
  $("#updated").textContent = "updated " + new Date().toLocaleTimeString();
}

async function start() {
  $("#login").classList.add("hidden");
  $("#app").classList.remove("hidden");
  // Config is loaded once (it only changes on reload).
  try { renderConfig(await api("/api/config")); } catch (e) { /* shown via stream auth */ }
  // Playground: editor pre-loaded with the running config, validates in-memory.
  initPlayground();
  // Live data via SSE, read with fetch() so the token rides in the Authorization
  // header (EventSource can't set headers, which is why the old code leaked it in
  // the URL). No cookie ⇒ no CSRF surface.
  startStream();
}

// startStream consumes the text/event-stream from /api/stream over fetch, parsing
// `data: …\n\n` frames by hand, and auto-reconnects while logged in. An
// AbortController lets logout tear the connection down.
async function startStream() {
  streamAbort = new AbortController();
  try {
    const res = await fetch("/api/stream", { headers: authHeaders(), signal: streamAbort.signal });
    if (!res.ok || !res.body) { $("#livedot").classList.remove("live"); return; }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const frame = buf.slice(0, i); buf = buf.slice(i + 2);
        const line = frame.split("\n").find((l) => l.startsWith("data:"));
        if (line) { try { applyFrame(JSON.parse(line.slice(5).trim())); } catch {} }
      }
    }
  } catch (e) {
    if (e && e.name === "AbortError") return; // logout
  }
  $("#livedot").classList.remove("live");
  if (TOKEN) setTimeout(startStream, 2000); // best-effort reconnect
}

$("#connect").onclick = async () => {
  TOKEN = $("#token").value.trim();
  if (!TOKEN) return;
  try {
    await api("/api/metrics"); // validate token
    sessionStorage.setItem("cadish_token", TOKEN);
    start();
  } catch (e) {
    $("#loginErr").textContent = "Invalid token.";
  }
};
$("#token").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#connect").click(); });
$("#logout").onclick = () => { TOKEN = ""; if (streamAbort) streamAbort.abort(); sessionStorage.removeItem("cadish_token"); location.reload(); };

if (TOKEN) {
  api("/api/metrics").then(start).catch(() => { $("#login").classList.remove("hidden"); $("#app").classList.add("hidden"); });
}
</script>
</body>
