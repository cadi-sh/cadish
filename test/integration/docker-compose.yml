# Real-binary end-to-end harness (backlog #4 / task #34): the cadish image built from
# deploy/Dockerfile in front of the test-origin and a MinIO S3 bucket. Driven by
# integration_test.go (//go:build integration), which brings this stack up, asserts
# behavior against the REAL distroless binary, and tears it down.
#
#   docker compose -f test/integration/docker-compose.yml up --build -d
#   go test -tags integration ./test/integration -v
#   docker compose -f test/integration/docker-compose.yml down -v
#
# The Go test (TestMain) orchestrates all of the above; this file documents the stack.
name: cadish-integration

services:
  # Plain-HTTP upstream. -latency makes coalescing observable; /_stats reports the
  # origin hit count (exposed on the host at :19000 so the test can read it).
  origin:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile.origin
    command: ["-addr", ":9000", "-latency", "200ms"]
    ports:
      - "19000:9000"
    healthcheck:
      test: ["CMD", "/usr/bin/test-origin", "-h"]
      disable: true

  # S3-compatible backend.
  minio:
    image: minio/minio:latest
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot seeder: make a public-read `media` bucket with a known object. cadish's
  # s3 origin fetches anonymously (Cadishfile S3 upstreams carry no credentials), so
  # the bucket download policy must be public.
  minio-seed:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        mc mb -p local/media
        mc anonymous set download local/media
        printf 'hello-from-minio\n' | mc pipe local/media/greeting.txt
        echo SEED_DONE
    restart: "no"

  # The artifact under test: the real distroless cadish binary from deploy/Dockerfile.
  # Runs as root (test-only) so a fresh cache volume's perms never block startup.
  cadish:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    user: "0:0"
    depends_on:
      origin:
        condition: service_started
      minio-seed:
        condition: service_completed_successfully
    ports:
      - "18080:8080"
    volumes:
      - ./Cadishfile:/etc/cadish/Cadishfile:ro
    command: ["run", "-config", "/etc/cadish/Cadishfile", "-addr", ":8080"]
