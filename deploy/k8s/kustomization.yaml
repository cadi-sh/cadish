apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Raw cadish manifests (TLS-terminating / ACME mode). Edit configmap.yaml with
# your Cadishfile and apply:
#
#   kubectl apply -k deploy/k8s
#
# For the "behind an Ingress" variant (plain HTTP), set tls off in the Cadishfile,
# change the Service to ClusterIP, drop the acme PVC + NET_BIND_SERVICE, and switch
# the probes to httpGet /healthz on the http port — or just use the Helm chart with
# `--set tls.mode=off`.
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - service.yaml
  - deployment.yaml
  - networkpolicy.yaml
