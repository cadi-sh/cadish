# cadish as an in-cluster Kubernetes Gateway API controller (Layer 2, slices 1+2).
#
# Apply alongside deploy/k8s/namespace.yaml and deploy/k8s/rbac-gateway.yaml:
#   kubectl apply -f deploy/k8s/namespace.yaml
#   kubectl apply -f deploy/k8s/rbac-gateway.yaml
#   kubectl apply -f deploy/k8s/gateway-controller.yaml
#
# Prereq: the Gateway API CRDs must be installed in the cluster (they are NOT bundled with
# Kubernetes):
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml
#
# Then create a GatewayClass with controllerName cadi.sh/gateway-controller (below), a
# Gateway with an HTTP listener, and HTTPRoutes attaching to it via parentRefs.
#
# Scope (slices 1+2): GatewayClass acceptance, HTTP + HTTPS (TLS Terminate) listeners with
# certificateRefs (BYO Secrets), HTTPRoute host + path routing with header/query/method
# matchers, cross-namespace refs via ReferenceGrant, weighted backends, and status. This
# Deployment binds :80 and :443 (HTTPS termination uses BYO Secret certs injected on
# reconcile — no ACME/PVC: ACME for a Gateway listener is deferred).
#
# Run this as a SEPARATE Deployment from the Ingress controller (a distinct
# ServiceAccount + controllerName) so the two controllers never contend for objects.
#
# HA: every replica serves traffic (no coordination); a leader-elected Lease gates ONLY the
# Gateway/HTTPRoute status writer. Run >= 2 replicas.
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cadish
spec:
  controllerName: cadi.sh/gateway-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cadish-gateway-base
  namespace: cadish
data:
  # The BASE Cadishfile: globals only. Sites/routes come from Gateway/HTTPRoute objects.
  base.cadish: |
    # cadish gateway-controller base config (globals only).
    #
    # Sites/routes come from Gateway/HTTPRoute objects — keep this file to true globals.
    # To enable the opt-in admin dashboard, set CADISH_ADMIN_TOKEN and uncomment:
    #
    # admin {
    #     listen :9090
    #     auth_token {$CADISH_ADMIN_TOKEN}
    #     metrics
    # }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadish-gateway
  namespace: cadish
  labels:
    app.kubernetes.io/name: cadish-gateway
spec:
  replicas: 2 # HA: all replicas serve; one is the leader status-writer.
  selector:
    matchLabels:
      app.kubernetes.io/name: cadish-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadish-gateway
    spec:
      terminationGracePeriodSeconds: 40
      serviceAccountName: cadish-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cadish
          image: ghcr.io/cadi-sh/cadish:0.2.0
          args:
            - gateway
            - -config
            - /etc/cadish/base.cadish
            - -addr
            - ":80"
            - -https-addr
            - ":443"
            - -leader-elect=true
            - -leader-namespace
            - cadish
          env:
            # Leader-election identity = the pod name (unique per replica).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CADISH_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cadish-admin
                  key: token
                  optional: true
            - name: GOMEMLIMIT
              value: "1700MiB"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: config
              mountPath: /etc/cadish
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: cadish-gateway-base
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cadish-gateway
  namespace: cadish
  labels:
    app.kubernetes.io/name: cadish-gateway
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: cadish-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
