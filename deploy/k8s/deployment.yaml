apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadish
  namespace: cadish
  labels:
    app.kubernetes.io/name: cadish
spec:
  replicas: 1
  # RWO PVCs (cache + ACME) can't be mounted by two pods at once → Recreate.
  # For HA, use RWX volumes and switch to RollingUpdate (see deploy/README.md).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cadish
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadish
    spec:
      # Outlast the server's ~30s in-flight drain on SIGTERM so a rollout / node
      # drain finishes serving open connections before the kubelet SIGKILLs.
      terminationGracePeriodSeconds: 40
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # fsGroup makes the mounted PVCs group-owned/-writable by uid 65532, so the
        # non-root process can create /var/cache/cadish/blobs on a FRESH (root-owned)
        # volume instead of crash-looping on "permission denied". This is the primary
        # fix and works on any CSI driver that honors fsGroup (most do).
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # If your volume type IGNORES fsGroup (hostPath, many local/NFS provisioners),
      # uncomment this initContainer: it runs once as root and chowns the cache (and
      # ACME) mounts to 65532 before cadish starts.
      # initContainers:
      #   - name: volume-permissions
      #     image: busybox:1.36
      #     command: ["sh", "-c", "chown -R 65532:65532 /var/cache/cadish /var/lib/cadish"]
      #     securityContext:
      #       runAsNonRoot: false
      #       runAsUser: 0
      #       allowPrivilegeEscalation: false
      #       capabilities:
      #         drop: ["ALL"]
      #         add: ["CHOWN"]
      #       seccompProfile:
      #         type: RuntimeDefault
      #     volumeMounts:
      #       - name: cache
      #         mountPath: /var/cache/cadish
      #       - name: acme
      #         mountPath: /var/lib/cadish
      containers:
        - name: cadish
          image: ghcr.io/cadi-sh/cadish:0.2.0
          args:
            - run
            - -config
            - /etc/cadish/Cadishfile
            - -addr
            - ":80"
            - -https-addr
            - ":443"
            - -acme-cache
            - /var/lib/cadish/acme
            - -idle-timeout
            - "60s"
          env:
            # Soft memory ceiling — set below the container limit, above the
            # `cache { ram … }` budget.
            - name: GOMEMLIMIT
              value: "1700MiB"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          # :80 only redirects/serves ACME challenges and :443 needs a cert, so we
          # probe the TLS port at the TCP level (accepting connections = serving).
          # With tls off, switch these to httpGet { path: /healthz, port: http }.
          startupProbe:
            tcpSocket:
              port: https
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: https
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              # Needed to bind :80/:443 as a non-root user. Drop this and use
              # high ports (-addr :8080 -https-addr :8443) to run cap-less.
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: config
              mountPath: /etc/cadish
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: acme
              mountPath: /var/lib/cadish
            - name: cache
              mountPath: /var/cache/cadish
      volumes:
        - name: config
          configMap:
            name: cadish
        # Writable scratch — RAM-only cache tiers create temp dirs here; the root
        # filesystem is read-only.
        - name: tmp
          emptyDir: {}
        - name: acme
          persistentVolumeClaim:
            claimName: cadish-acme
        - name: cache
          persistentVolumeClaim:
            claimName: cadish-cache
