apiVersion: v1
kind: ConfigMap
metadata:
  name: cadish
  namespace: cadish
  labels:
    app.kubernetes.io/name: cadish
data:
  Cadishfile: |
    # Replace with your real Cadishfile. Keep a synthetic health endpoint if you
    # switch to HTTP probes (tls off): `respond /healthz 200 "OK"`.
    example.com {
        tls { acme you@example.com }

        cache {
            ram  1GiB
            disk /var/cache/cadish 20Gi
        }

        upstream backend {
            to http://my-origin.default.svc.cluster.local:8080
        }

        respond /healthz 200 "OK"

        cache_ttl default ttl 1m grace 1h
        header +cache_status X-Cache
    }
