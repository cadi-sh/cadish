{{- if .Values.controller.enabled }}
{{- $name := printf "%s-ingress" (include "cadish.fullname" .) -}}
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: {{ .Values.controller.className }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
  {{- if .Values.controller.defaultClass }}
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
  {{- end }}
spec:
  controller: cadi.sh/ingress-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
---
{{- /*
  RBAC split (Finding 4, least privilege).

  The controller's informers watch cluster-wide and reconcile filters by namespace in
  code, so the READ permissions (endpointslices, ingresses, secrets, configmaps) must be
  cluster-wide even when `controller.namespaces` restricts which Ingresses are served — a
  namespace-scoped LIST/WATCH would be denied at the API server and break the informer.
  ingressclasses are cluster-scoped and are always cluster-wide.

  But the controller's WRITES are confined to the served namespaces: it patches
  ingresses/status only on Ingresses it owns and creates Events only in the involved
  object's namespace. So when `controller.namespaces` is set, we DROP those write verbs
  from the ClusterRole and instead grant them via a per-namespace Role/RoleBinding — the
  controller can no longer write status/Events cluster-wide, shrinking the blast radius.
  When namespaces is empty (default, all namespaces) the writes stay in the ClusterRole.
*/}}
{{- $nsList := list }}
{{- if .Values.controller.namespaces }}
{{- $nsList = splitList "," (.Values.controller.namespaces | toString) }}
{{- end }}
{{- $scopedWrites := gt (len $nsList) 0 }}
{{- /*
  C1 (label-scoped RBAC, hostile-multi-tenant hardening): when controller.rbac.scoped is
  true AND a known namespace set is configured, the high-blast-radius Secret/ConfigMap
  READS are granted via per-namespace Roles in those namespaces instead of the cluster-wide
  ClusterRole. A controller compromise then can read Secrets only in the served namespaces
  (+ the controller's own, for the base ConfigMap), not the whole cluster. Pair with
  controller.labelSelector to additionally bound WHICH objects within them are cached.
  Requires namespaces (cluster-wide reads are unavoidable when serving all namespaces).
*/}}
{{- $scopedReads := and .Values.controller.rbac.scoped $scopedWrites }}
{{- if and .Values.controller.rbac.scoped (not $scopedWrites) }}
{{- fail "controller.rbac.scoped requires controller.namespaces to be set (cluster-wide Secret/ConfigMap reads are unavoidable when serving all namespaces)" }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
rules:
# Cluster-wide READS: required because the informers watch cluster-wide (reconcile filters
# by namespace in code). A namespace-scoped LIST/WATCH would be denied and break the cache.
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "ingressclasses"]
  verbs: ["get", "list", "watch"]
{{- if not $scopedReads }}
# Cluster-wide Secret/ConfigMap READS (default). With controller.rbac.scoped these move to
# per-namespace Roles below so a compromise cannot read every Secret in the cluster.
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "watch"]
{{- end }}
# The publish Service: the leader status writer reads its LoadBalancer address to
# populate Ingress status.loadBalancer. Cluster-wide READ, always required.
# Least privilege: a direct GET of the single publish Service (no Service informer),
# so `get` alone suffices — no list/watch.
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get"]
{{- if not $scopedWrites }}
# Cluster-wide WRITES (default: all namespaces). When controller.namespaces is set these
# move to per-namespace Roles below so the controller cannot write status/Events globally.
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses/status"]
  verbs: ["update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
{{- if $scopedWrites }}
{{- range $ns := $nsList }}
{{- $ns = trim $ns }}
---
# Least-privilege WRITE scope for namespace {{ $ns }}: the controller may patch
# ingresses/status and create Events ONLY here (and in {{ $.Release.Namespace }} for
# controller-scoped IngressClass Events), never cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-writes
  namespace: {{ $ns }}
  labels:
    {{- include "cadish.labels" $ | nindent 4 }}
rules:
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses/status"]
  verbs: ["update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-writes
  namespace: {{ $ns }}
  labels:
    {{- include "cadish.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-writes
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- if not (has $.Release.Namespace $nsList) }}
---
# The controller emits IngressClass-scoped Events (RenderFailed/ApplyFailed) and Secret
# Events into its OWN namespace; grant Event creation there too when it is not already a
# served namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-writes
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cadish.labels" $ | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-writes
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cadish.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-writes
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- if $scopedReads }}
{{- /* Per-namespace Secret/ConfigMap READ Roles (C1). The controller's own namespace is
   included so the base Cadishfile ConfigMap and Secret/ConfigMap objects there are read. */}}
{{- $readNs := $nsList }}
{{- if not (has $.Release.Namespace $readNs) }}
{{- $readNs = append $readNs $.Release.Namespace }}
{{- end }}
{{- range $ns := $readNs }}
{{- $ns = trim $ns }}
---
# Least-privilege Secret/ConfigMap READS for namespace {{ $ns }}: the controller may read
# TLS Secrets and cadi.sh/policy ConfigMaps ONLY here, never cluster-wide. Pair with
# controller.labelSelector to bound WHICH objects within this namespace are cached.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-reads
  namespace: {{ $ns }}
  labels:
    {{- include "cadish.labels" $ | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-reads
  namespace: {{ $ns }}
  labels:
    {{- include "cadish.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-reads
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-leader
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-base
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
data:
  base.cadish: |
{{ .Values.controller.base | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "cadish.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingress-controller
  template:
    metadata:
      labels:
        {{- include "cadish.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingress-controller
    spec:
      # Outlast the controller's in-flight drain on SIGTERM so a rollout / node
      # drain finishes serving open connections before the kubelet SIGKILLs.
      terminationGracePeriodSeconds: {{ .Values.controller.terminationGracePeriodSeconds | default 40 }}
      serviceAccountName: {{ $name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cadish
          image: {{ include "cadish.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - ingress
            - -config
            - /etc/cadish/base.cadish
            - -ingress-class
            - {{ .Values.controller.className | quote }}
            - -addr
            - ":{{ .Values.containerPorts.http }}"
            - -https-addr
            - ":{{ .Values.containerPorts.https }}"
            - -acme-cache
            - /var/lib/cadish/acme
            {{- if .Values.controller.namespaces }}
            - -namespace
            - {{ .Values.controller.namespaces | quote }}
            {{- end }}
            {{- if .Values.controller.publishService }}
            - -publish-service
            - {{ .Values.controller.publishService | quote }}
            {{- end }}
            {{- with .Values.controller.labelSelector.watch }}
            - -watch-label-selector
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.labelSelector.secrets }}
            - -secret-label-selector
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.labelSelector.configMaps }}
            - -configmap-label-selector
            - {{ . | quote }}
            {{- end }}
            - -leader-elect={{ .Values.controller.leaderElection.enabled }}
            - -leader-namespace
            - {{ .Release.Namespace }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.gomemlimit }}
            - name: GOMEMLIMIT
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPorts.http }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.containerPorts.https }}
              protocol: TCP
          # Startup + readiness use the reserved warm-readiness endpoint: cadish serves
          # /.cadish/readyz with 503 until the controller's FIRST reconcile builds the
          # routing table from synced listers, then 200. A TCP probe passes the instant
          # the listener binds — before routing exists — so on a rollout k8s would route
          # to an un-warmed pod and serve transient 502/404s. The HTTP probe gates traffic
          # on real readiness instead. (Raw-manifest parity: deploy/k8s/*-controller.yaml.)
          startupProbe:
            httpGet:
              path: /.cadish/readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /.cadish/readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness stays TCP on purpose: it must check PROCESS-ALIVE, not warm. A
          # warm-based liveness would kill a pod that is merely between configs.
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - name: config
              mountPath: /etc/cadish
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: acme
              mountPath: /var/lib/cadish
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-base
        - name: tmp
          emptyDir: {}
        - name: acme
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cadish.labels" . | nindent 4 }}
  {{- with .Values.controller.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controller.service.type }}
  {{- if eq .Values.controller.service.type "LoadBalancer" }}
  # Preserve the real client source IP so geo / rate_limit / ACLs see the client, not
  # a SNAT'ing node. Override via controller.service.externalTrafficPolicy.
  externalTrafficPolicy: {{ .Values.controller.service.externalTrafficPolicy | default "Local" }}
  {{- end }}
  selector:
    {{- include "cadish.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingress-controller
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
{{- end }}
