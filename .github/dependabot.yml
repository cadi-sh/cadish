version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions — keeps the SHA-pinned `uses:` refs current (Dependabot
  # rewrites the SHA and the trailing `# vN` comment together).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  # Docker base images — keeps the digest-pinned `FROM …@sha256:` refs current
  # (Dependabot rewrites the digest and the trailing tag together).
  - package-ecosystem: docker
    directory: "/deploy"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
